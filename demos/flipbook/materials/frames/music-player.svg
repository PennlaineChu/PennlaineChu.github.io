<?xml version="1.0" encoding="UTF-8"?>
<!--
  Music-player card frame.
  - <rect id="photo-window"> is the album-art slot. svgFrameLoader
    auto-detects it, hides it, and renders the user photo behind it.
  - Caption-as-song-title renders inside the text area (handled by
    the app, not this file).
  - Design: 400 x 600 (2:3), rounded white card, glassy album slot,
    play/pause transport, volume bar, tiny album-title + artist marks.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">

  <!-- SHADOW -->
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f2ea"/>
      <stop offset="100%" stop-color="#eae3d3"/>
    </linearGradient>
    <linearGradient id="progressBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="55%" stop-color="#2a2a2a"/>
      <stop offset="55%" stop-color="#c9c2b2"/>
      <stop offset="100%" stop-color="#c9c2b2"/>
    </linearGradient>
  </defs>

  <!-- CARD body, with a hole cut out at the photo window so the
       user's <img> (rendered behind this SVG overlay by
       svgFrameLoader) actually shows through.

       Two subpaths + fill-rule="evenodd":
         • outer rounded rect (10,10,380×580, rx=24)  — the card
         • inner rounded rect (38,58,324×324,  rx=4)  — the hole
       Direction matches the marker rect at the bottom of this
       file so the card body is opaque everywhere EXCEPT the
       album-art window.  The visible dark bezel + hairline (the
       two stroke-only rects below) hide the cut edge. -->
  <path d="M 34,10 H 366 A 24,24 0 0 1 390,34 V 566 A 24,24 0 0 1 366,590 H 34 A 24,24 0 0 1 10,566 V 34 A 24,24 0 0 1 34,10 Z M 42,58 H 358 A 4,4 0 0 1 362,62 V 378 A 4,4 0 0 1 358,382 H 42 A 4,4 0 0 1 38,378 V 62 A 4,4 0 0 1 42,58 Z"
        fill="url(#cardBg)" fill-rule="evenodd"
        filter="url(#cardShadow)"/>
  <!-- Card outer border — separate stroke-only rect so the
       evenodd path above doesn't also stroke the inner hole
       (which would compete with the dark bezel). -->
  <rect x="10" y="10" width="380" height="580" rx="24" ry="24"
        fill="none" stroke="rgba(30,20,15,0.35)" stroke-width="1.2"/>

  <!-- Tiny corner holes / grommets for tactile feel -->
  <circle cx="30" cy="30" r="2.6" fill="#2a2a2a" opacity="0.5"/>
  <circle cx="370" cy="30" r="2.6" fill="#2a2a2a" opacity="0.5"/>

  <!-- ========= PHOTO WINDOW (auto-detected) =========
       The bezel is rendered as a STROKE-only rect so the centre
       is genuinely empty.  Originally this was a filled dark rect
       sitting BEHIND the photo-window marker — but svgFrameLoader
       only hides the marker (fill: none), so the filled bezel kept
       painting opaquely over the user's photo and nothing showed
       through.  A stroke-only rect at the bezel's midline keeps
       the same 8px dark border footprint without painting any
       fill in the centre, letting the &lt;img&gt; behind the SVG
       overlay show through cleanly. -->
  <rect x="34" y="54" width="332" height="332" rx="6" ry="6"
        fill="none" stroke="#1a1a1a" stroke-width="8"/>
  <!-- Hairline edge inside the bezel for the recessed-slot look -->
  <rect x="38.5" y="58.5" width="323" height="323" rx="3" ry="3"
        fill="none" stroke="rgba(0,0,0,0.45)" stroke-width="1"/>
  <!-- The marker itself — svgFrameLoader hides this and uses its
       bbox to position the user photo. -->
  <rect id="photo-window"
        x="38" y="58" width="324" height="324" rx="4" ry="4"
        fill="none"/>

  <!-- Glossy reflection strip across the album art — decorative
       only.  Sits OVER the photo by design (6% white).  Clipped
       to the album-slot rect so it doesn't bleed onto the card.   -->
  <path d="M 40 58 L 360 58 L 360 120 Q 250 80, 40 150 Z"
        fill="#ffffff" opacity="0.06" pointer-events="none"/>

  <!-- ========= TRANSPORT AREA ========= -->
  <!-- now-playing text block (actual text is injected by the app;
       leave these as subtle placeholder marks so the card still
       looks complete in isolation) -->
  <rect x="30" y="408" width="240" height="14" rx="3" fill="#2a2a2a" opacity="0.85"/>
  <rect x="30" y="430" width="170" height="10" rx="3" fill="#6a625a" opacity="0.8"/>

  <!-- progress bar -->
  <rect x="30" y="460" width="340" height="4" rx="2" fill="url(#progressBar)"/>
  <circle cx="220" cy="462" r="6" fill="#2a2a2a"/>

  <!-- time stamps -->
  <text x="30"  y="482" font-family="Courier New, monospace" font-size="11" fill="#3a3530">1:48</text>
  <text x="370" y="482" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#3a3530">3:21</text>

  <!-- transport buttons -->
  <g transform="translate(200,528)">
    <!-- prev -->
    <g transform="translate(-80,0)">
      <polygon points="0,0 -18,-14 -18,14" fill="#2a2a2a"/>
      <rect x="-22" y="-14" width="3" height="28" fill="#2a2a2a"/>
    </g>
    <!-- play (big center) -->
    <circle cx="0" cy="0" r="30" fill="#2a2a2a"/>
    <polygon points="-8,-12 -8,12 14,0" fill="#f6f2ea"/>
    <!-- next -->
    <g transform="translate(80,0)">
      <polygon points="0,0 18,-14 18,14" fill="#2a2a2a"/>
      <rect x="19" y="-14" width="3" height="28" fill="#2a2a2a"/>
    </g>
  </g>

  <!-- volume dots -->
  <g transform="translate(200,572)" opacity="0.55">
    <circle cx="-30" cy="0" r="1.8" fill="#3a3530"/>
    <circle cx="-18" cy="0" r="1.8" fill="#3a3530"/>
    <circle cx="-6"  cy="0" r="1.8" fill="#3a3530"/>
    <circle cx="6"   cy="0" r="1.8" fill="#3a3530"/>
    <circle cx="18"  cy="0" r="1.8" fill="#3a3530"/>
    <circle cx="30"  cy="0" r="1.8" fill="#3a3530"/>
  </g>
</svg>
