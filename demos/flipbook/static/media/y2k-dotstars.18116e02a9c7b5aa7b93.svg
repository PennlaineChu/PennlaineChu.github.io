<svg xmlns="http://www.w3.org/2000/svg" width="540" height="960" viewBox="0 0 540 960" preserveAspectRatio="xMidYMid slice">
  <!--
    Y2K halftone-dotted star pattern — matches reference template 5
    (black background with white dotted 5-point stars of varying sizes,
    overlapping and rotated like a xeroxed zine page).
    9:16 page-native so CSS `background-size: cover` shows the whole thing.
  -->
  <defs>
    <pattern id="halftone" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.3" fill="#ffffff"/>
    </pattern>
    <pattern id="halftone-coarse" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#ffffff"/>
    </pattern>
    <symbol id="star5" viewBox="0 0 100 100">
      <path d="M50 4 L 62 38 L 98 38 L 68 60 L 80 96 L 50 74 L 20 96 L 32 60 L 2 38 L 38 38 Z"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="540" height="960" fill="#0a0a0a"/>

  <!-- TOP REGION -->
  <!-- Big star upper-left, rotated -->
  <g transform="translate(-30 40) rotate(-10 120 120)">
    <use href="#star5" width="240" height="240" fill="url(#halftone-coarse)"/>
  </g>
  <!-- Medium star upper-right -->
  <g transform="translate(360 30) rotate(16 80 80)">
    <use href="#star5" width="160" height="160" fill="url(#halftone)"/>
  </g>
  <!-- Tiny filler between -->
  <g transform="translate(250 110) rotate(8 30 30)">
    <use href="#star5" width="60" height="60" fill="url(#halftone)"/>
  </g>

  <!-- UPPER-MIDDLE -->
  <g transform="translate(-40 280) rotate(-4 90 90)">
    <use href="#star5" width="180" height="180" fill="url(#halftone)"/>
  </g>
  <g transform="translate(380 260) rotate(24 70 70)">
    <use href="#star5" width="140" height="140" fill="url(#halftone)"/>
  </g>
  <g transform="translate(200 340) rotate(-12 40 40)">
    <use href="#star5" width="80" height="80" fill="url(#halftone)"/>
  </g>

  <!-- CENTER -->
  <g transform="translate(40 460) rotate(18 110 110)">
    <use href="#star5" width="220" height="220" fill="url(#halftone-coarse)"/>
  </g>
  <g transform="translate(330 480) rotate(-8 90 90)">
    <use href="#star5" width="180" height="180" fill="url(#halftone)"/>
  </g>

  <!-- LOWER-MIDDLE -->
  <g transform="translate(-20 680) rotate(10 90 90)">
    <use href="#star5" width="180" height="180" fill="url(#halftone)"/>
  </g>
  <g transform="translate(250 700) rotate(-16 70 70)">
    <use href="#star5" width="140" height="140" fill="url(#halftone)"/>
  </g>
  <g transform="translate(420 720) rotate(6 50 50)">
    <use href="#star5" width="100" height="100" fill="url(#halftone)"/>
  </g>

  <!-- BOTTOM -->
  <g transform="translate(40 820) rotate(-20 80 80)">
    <use href="#star5" width="160" height="160" fill="url(#halftone-coarse)"/>
  </g>
  <g transform="translate(320 840) rotate(14 90 90)">
    <use href="#star5" width="180" height="180" fill="url(#halftone)"/>
  </g>
  <g transform="translate(200 900) rotate(4 30 30)">
    <use href="#star5" width="60" height="60" fill="url(#halftone)"/>
  </g>
</svg>
